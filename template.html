<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Speaking Practice — {日期} — {主题}</title>
<style>
  :root {
    --text: #1a1a1a;
    --bg: #fafaf8;
    --accent: #2c5f8a;
    --muted: #6b6b6b;
    --border: #e0e0dc;
    --tag-bg: #eef4f8;
    --highlight-bg: #fffbe6;
    --highlight-border: #f0d94e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Georgia", "Noto Serif", "Times New Roman", serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.85;
    max-width: 720px;
    margin: 0 auto;
    padding: 60px 24px;
  }
  header {
    text-align: center;
    margin-bottom: 48px;
    padding-bottom: 32px;
    border-bottom: 1px solid var(--border);
  }
  header h1 {
    font-size: 1.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  header .meta {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .section-title {
    font-size: 1rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--accent);
    margin: 40px 0 16px;
    padding-bottom: 8px;
    border-bottom: 2px solid var(--accent);
    display: inline-block;
  }
  .script {
    font-size: 1.15rem;
    line-height: 2;
    margin-bottom: 40px;
  }
  .script p {
    margin-bottom: 16px;
    text-indent: 0;
  }
  .script .word-note {
    color: var(--accent);
    font-size: 0.85rem;
    font-style: normal;
  }
  .expression-list {
    list-style: none;
    padding: 0;
  }
  .expression-list li {
    margin-bottom: 20px;
    padding: 14px 18px;
    background: white;
    border-left: 3px solid var(--accent);
    border-radius: 0 6px 6px 0;
  }
  .expression-list .en {
    font-size: 1.05rem;
    font-family: "SF Mono", "Menlo", "Consolas", monospace;
    background: var(--tag-bg);
    padding: 2px 8px;
    border-radius: 3px;
    display: inline-block;
    margin-bottom: 4px;
  }
  .expression-list .cn {
    font-size: 0.9rem;
    color: var(--muted);
  }
  .expression-list .note {
    font-size: 0.85rem;
    color: #888;
    margin-top: 2px;
    font-style: italic;
  }
  .badge {
    display: inline-block;
    font-size: 0.7rem;
    padding: 1px 8px;
    border-radius: 10px;
    margin-left: 6px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-pattern { background: #e8f0fe; color: #2c5f8a; }
  .badge-express { background: #e8f5e9; color: #2e7d32; }
  .context-block {
    background: var(--highlight-bg);
    border: 1px solid var(--highlight-border);
    border-radius: 8px;
    padding: 16px 20px;
    margin: 24px 0;
    font-size: 0.95rem;
    color: #5a4a00;
  }
  .context-block strong { color: #3a3000; }
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    text-align: center;
    font-size: 0.85rem;
    color: var(--muted);
  }
  @media (max-width: 600px) {
    body { padding: 32px 16px; }
    header h1 { font-size: 1.4rem; }
    .script { font-size: 1.05rem; }
  }
</style>
</head>
<body>

<header>
  <h1>🗣 {标题}</h1>
  <p class="meta">{日期} · {话题标签} · 约 {词数} 词</p>
</header>

<section>
  <div class="section-title">📝 口语稿 Script</div>
  <div class="script">
    <!-- 口语稿内容，生词用 <span class="word-note">中文</span> 标注 -->
  </div>
</section>

<section>
  <div class="section-title">💡 常用表达 Key Expressions</div>
  <div class="context-block">
    <strong>📖 对话背景：</strong>{一句话中文回顾聊了什么}
  </div>
  <ul class="expression-list">
    <!-- 5-8 个表达 -->
  </ul>
</section>

<footer>
  Generated by English Speaking Practice · {生成时间}
</footer>

</body>
</html>
